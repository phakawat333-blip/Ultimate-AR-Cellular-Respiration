<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>🌍 AR Cellular Respiration - ควบคุมด้วยท่าทาง</title>
  
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; overflow: hidden; background: radial-gradient(circle, #0a0a2a, #000000); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #webcam { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -2; transform: scaleX(-1); filter: brightness(0.4) saturate(1.2); }
    #aframe-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
    
    /* UI หัวข้อและคำแนะนำ - ระดับโลก */
    #ui-container { 
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
      width: 95%; max-width: 750px; z-index: 10; text-align: center; pointer-events: none;
      background: rgba(10, 10, 30, 0.65);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      border: 1px solid rgba(0, 255, 200, 0.3);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 255, 200, 0.1);
      padding: 8px 20px 15px 20px;
    }
    #stage-title { 
      color: #00FFD0; font-size: 28px; font-weight: 800; 
      text-shadow: 0 0 20px #00FFD0, 0 0 40px #00AA88;
      letter-spacing: 2px;
      margin-top: 5px;
    }
    #instruction { 
      color: #f0f0ff; font-size: 20px; padding: 10px 5px; 
      transition: all 0.4s ease;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 40px;
      text-shadow: 0 0 15px rgba(0,200,255,0.3);
      font-weight: 500;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #instruction b { color: #FFD700; background: rgba(255,215,0,0.15); padding: 2px 12px; border-radius: 30px; }
    
    /* ปุ่มเลื่อนขั้นตอนแบบ Hand Gesture (ใช้มือปัด) */
    #gesture-hint {
      display: inline-block;
      background: rgba(255, 255, 255, 0.08);
      border: 1px dashed rgba(255,255,255,0.3);
      border-radius: 40px;
      padding: 5px 18px;
      margin-left: 10px;
      font-size: 16px;
      color: #88ddff;
      letter-spacing: 1px;
      animation: pulse-glow 2s infinite;
    }
    @keyframes pulse-glow {
      0% { box-shadow: 0 0 5px rgba(0,255,200,0.1); }
      50% { box-shadow: 0 0 25px rgba(0,255,200,0.3); }
      100% { box-shadow: 0 0 5px rgba(0,255,200,0.1); }
    }
    
    #loading { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
      color: #ccffdd; font-size: 28px; z-index: 20; 
      background: rgba(0, 0, 0, 0.8); padding: 30px 50px; border-radius: 60px; 
      border: 2px solid #00ffaa;
      box-shadow: 0 0 80px #00ffaa44;
      backdrop-filter: blur(5px);
      font-weight: 300;
      letter-spacing: 2px;
      text-align: center;
    }
    #loading span { display: block; font-size: 16px; color: #88ddff; margin-top: 8px; }
    
    /* แถบสถานะขั้นตอน */
    #progress-bar {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; gap: 12px; 
      background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .dot { 
      width: 14px; height: 14px; border-radius: 50%; 
      background: #445566; transition: 0.3s; 
      border: 1px solid #667788;
    }
    .dot.active { background: #00FFD0; box-shadow: 0 0 20px #00FFD0; border-color: #00FFD0; }
    .dot.done { background: #2ECC71; border-color: #2ECC71; }
  </style>
</head>

<body>
  <!-- เสียงเอฟเฟกต์ระดับโลก -->
  <audio id="snd-suck" src="https://actions.google.com/sounds/v1/science_fiction/sci_fi_hover_craft_pass_by.ogg" preload="auto"></audio>
  <audio id="snd-boom" src="https://actions.google.com/sounds/v1/science_fiction/force_field_explosion.ogg" preload="auto"></audio>
  <audio id="snd-success" src="https://actions.google.com/sounds/v1/cartoon/magic_chime.ogg" preload="auto"></audio>
  <audio id="snd-ambient" src="https://actions.google.com/sounds/v1/ambient/underwater_ambience.ogg" preload="auto" loop></audio>
  <audio id="snd-swipe" src="https://actions.google.com/sounds/v1/interface/ui_swipe.ogg" preload="auto"></audio>

  <div id="loading">
    🌟 กำลังเปิดมิติวิทยาศาสตร์<br>
    <span>ตรวจจับมือทั้ง 2 ข้างเพื่อเริ่มเรียน</span>
  </div>
  
  <div id="ui-container">
    <div id="stage-title">⚡ กระบวนการหายใจระดับเซลล์</div>
    <div id="instruction">
      🙌 ยกมือขึ้น แล้วจับวัตถุให้ชนกัน
      <span id="gesture-hint">👋 ปัดมือซ้าย-ขวาเพื่อเลื่อนด่าน</span>
    </div>
  </div>

  <!-- แถบแสดงสถานะ -->
  <div id="progress-bar"></div>

  <video id="webcam" autoplay playsinline></video>

  <a-scene id="aframe-canvas" renderer="alpha: true" vr-mode-ui="enabled: false">
    <a-entity camera position="0 0 5"></a-entity>

    <!-- จุดแสดงนิ้วมือ -->
    <a-sphere id="hand1-index" radius="0.12" color="#FF3377" material="emissive: #FF3377; emissiveIntensity: 2; transparent: true; opacity: 0.9"></a-sphere>
    <a-sphere id="hand1-thumb" radius="0.12" color="#FF3377" material="emissive: #FF3377; emissiveIntensity: 2; transparent: true; opacity: 0.9"></a-sphere>
    <a-sphere id="hand2-index" radius="0.12" color="#00FFCC" material="emissive: #00FFCC; emissiveIntensity: 2; transparent: true; opacity: 0.9"></a-sphere>
    <a-sphere id="hand2-thumb" radius="0.12" color="#00FFCC" material="emissive: #00FFCC; emissiveIntensity: 2; transparent: true; opacity: 0.9"></a-sphere>
    
    <!-- วงแหวนรอบมือ -->
    <a-ring id="ring1" radius-inner="0.25" radius-outer="0.35" color="#FF3377" material="emissive: #FF3377; transparent: true; opacity: 0.3; side: double" position="0 0 -3"></a-ring>
    <a-ring id="ring2" radius-inner="0.25" radius-outer="0.35" color="#00FFCC" material="emissive: #00FFCC; transparent: true; opacity: 0.3; side: double" position="0 0 -3"></a-ring>

    <!-- เอฟเฟกต์ระเบิด -->
    <a-entity id="explosion-group" position="0 0 -3" visible="false">
      <a-sphere id="boom-core" radius="0.2" color="#FFFFFF" material="emissive: #FFFFFF; emissiveIntensity: 5; shader: flat"></a-sphere>
      <a-ring id="boom-shockwave1" radius-inner="0.2" radius-outer="0.4" color="#F1C40F" material="emissive: #F1C40F; side: double; transparent: true"></a-ring>
      <a-ring id="boom-shockwave2" radius-inner="0.2" radius-outer="0.5" color="#3498DB" material="emissive: #3498DB; side: double; transparent: true" rotation="90 0 0"></a-ring>
      <a-ring id="boom-shockwave3" radius-inner="0.2" radius-outer="0.6" color="#9B59B6" material="emissive: #9B59B6; side: double; transparent: true" rotation="45 45 0"></a-ring>
    </a-entity>

    <a-entity id="objects-container"></a-entity>

    <!-- ระบบแสง -->
    <a-light type="ambient" color="#446688" intensity="0.3"></a-light>
    <a-light type="point" color="#00ffcc" intensity="0.8" position="2 3 4"></a-light>
    <a-light type="point" color="#ff66aa" intensity="0.6" position="-3 1 5"></a-light>
  </a-scene>

  <script>
    // --------------------------------------------------------------
    // ฐานข้อมูลเนื้อหา
    // --------------------------------------------------------------
    const stagesData = [
      {
        title: "🌱 1. ไกลโคไลซิส (Glycolysis)",
        desc: "ลาก <b>Glucose</b> กับ <b>2 ATP</b> (ลงทุน) มาชนกัน!",
        reactants: [
          { id: 'r1', type: 'box', text: "🍬 Glucose", color: "#2ECC71", pos: "-2.8 0.5 -3" },
          { id: 'r2', type: 'cylinder', text: "🔋 2 ATP", color: "#F1C40F", pos: "2.8 0.5 -3" }
        ],
        products: [
          { id: 'p1', type: 'sphere', text: "🔥 2 Pyruvate", color: "#E67E22", pos: "-2.0 0.2 -3" },
          { id: 'p2', type: 'cylinder', text: "⚡ 4 ATP", color: "#F1C40F", pos: "0 1.8 -3" },
          { id: 'p3', type: 'box', text: "🧬 2 NADH", color: "#9B59B6", pos: "2.0 0.2 -3" }
        ],
        successMsg: "✨ แตกกลูโคส! ได้พลังงานและ NADH"
      },
      {
        title: "🔥 2. การสร้าง Acetyl-CoA",
        desc: "นำ <b>2 Pyruvate</b> ชนกับ <b>Coenzyme A</b>",
        reactants: [
          { id: 'r1', type: 'sphere', text: "🔥 2 Pyruvate", color: "#E67E22", pos: "-2.8 0.5 -3" },
          { id: 'r2', type: 'box', text: "🧪 2 CoA", color: "#95A5A6", pos: "2.8 0.5 -3" }
        ],
        products: [
          { id: 'p1', type: 'box', text: "⚗️ 2 Acetyl-CoA", color: "#E74C3C", pos: "-2.0 0.2 -3" },
          { id: 'p2', type: 'cone', text: "💨 2 CO2", color: "#7F8C8D", pos: "0 1.8 -3" },
          { id: 'p3', type: 'box', text: "🧬 2 NADH", color: "#9B59B6", pos: "2.0 0.2 -3" }
        ],
        successMsg: "🌬️ ปล่อย CO2! พร้อมเข้าสู่วัฏจักรเครบส์"
      },
      {
        title: "🌀 3. วัฏจักรเครบส์ (Krebs Cycle)",
        desc: "รวม <b>Acetyl-CoA</b> กับ <b>Oxaloacetate</b>",
        reactants: [
          { id: 'r1', type: 'box', text: "⚗️ Acetyl-CoA", color: "#E74C3C", pos: "-2.8 0.5 -3" },
          { id: 'r2', type: 'sphere', text: "🔄 Oxaloacetate", color: "#1ABC9C", pos: "2.8 0.5 -3" }
        ],
        products: [
          { id: 'p1', type: 'cone', text: "💨 4 CO2", color: "#7F8C8D", pos: "-2.2 1.2 -3" },
          { id: 'p2', type: 'box', text: "🧬 6 NADH\n2 FADH2", color: "#9B59B6", pos: "0 0 -3" },
          { id: 'p3', type: 'cylinder', text: "⚡ 2 ATP", color: "#F1C40F", pos: "2.2 1.2 -3" }
        ],
        successMsg: "⚡ สกัดอิเล็กตรอนมหาศาล!"
      },
      {
        title: "⚡ 4. ETC & ATP synthase",
        desc: "ลาก <b>NADH/FADH2</b> ไปชน <b>Oxygen</b>!",
        reactants: [
          { id: 'r1', type: 'box', text: "🧬 NADH/FADH2", color: "#9B59B6", pos: "-2.8 0.5 -3" },
          { id: 'r2', type: 'sphere', text: "💨 O2", color: "#3498DB", pos: "2.8 0.5 -3" }
        ],
        products: [
          { id: 'p1', type: 'cylinder', text: "⚡ 32 ATP", color: "#F1C40F", pos: "-1.5 0.5 -3", scale: "1.6 1.6 1.6" },
          { id: 'p2', type: 'sphere', text: "💧 H2O", color: "#3498DB", pos: "1.5 0.5 -3" }
        ],
        successMsg: "🎉 สังเคราะห์ ATP ได้เต็มที่! พลังงานสูงสุด"
      }
    ];

    // --------------------------------------------------------------
    // ตัวแปรหลัก
    // --------------------------------------------------------------
    let currentStage = 0;
    let appState = "REACTANTS"; // REACTANTS, EXPLODING, PRODUCTS, TRANSITION, COMPLETE
    let grabbableElements = [];
    let grabbedByHand = [null, null];

    // ตัวแปรสำหรับตรวจจับการปัด (Swipe)
    let swipeHandX = null;          // ตำแหน่ง X ของมือล่าสุด
    let swipeHandId = null;        // ID ของมือที่ใช้ปัด
    let swipeThreshold = 1.2;      // ระยะที่ถือว่าปัด
    let isSwiping = false;

    const container = document.getElementById('objects-container');
    const titleEl = document.getElementById('stage-title');
    const descEl = document.getElementById('instruction');
    const explosionGroup = document.getElementById('explosion-group');
    const loadingEl = document.getElementById('loading');
    const progressBar = document.getElementById('progress-bar');
    
    const sndSuck = document.getElementById('snd-suck');
    const sndBoom = document.getElementById('snd-boom');
    const sndSuccess = document.getElementById('snd-success');
    const sndAmbient = document.getElementById('snd-ambient');
    const sndSwipe = document.getElementById('snd-swipe');

    // เปิดเสียงพื้นหลัง
    sndAmbient.volume = 0.2;
    sndAmbient.play().catch(() => {});

    // --------------------------------------------------------------
    // ฟังก์ชันสร้าง Progress Bar
    // --------------------------------------------------------------
    function updateProgressBar() {
      progressBar.innerHTML = '';
      stagesData.forEach((_, idx) => {
        const dot = document.createElement('div');
        dot.className = 'dot';
        if (idx === currentStage) dot.classList.add('active');
        else if (idx < currentStage) dot.classList.add('done');
        progressBar.appendChild(dot);
      });
    }
    updateProgressBar();

    // --------------------------------------------------------------
    // ฟังก์ชันสร้างวัตถุ 3D
    // --------------------------------------------------------------
    function createEntity(data) {
      const el = document.createElement(`a-${data.type}`);
      el.setAttribute('id', data.id);
      el.setAttribute('position', data.pos);
      el.setAttribute('color', data.color);
      el.setAttribute('material', `emissive: ${data.color}; emissiveIntensity: 0.3; metalness: 0.1; roughness: 0.4`);
      if(data.scale) el.setAttribute('scale', data.scale);
      
      // พื้นผิวเรืองแสง
      const glow = document.createElement('a-ring');
      glow.setAttribute('radius-inner', '0.6');
      glow.setAttribute('radius-outer', '0.8');
      glow.setAttribute('color', data.color);
      glow.setAttribute('material', `emissive: ${data.color}; transparent: true; opacity: 0.15; side: double`);
      glow.setAttribute('position', '0 0 0');
      glow.setAttribute('rotation', '-90 0 0');
      el.appendChild(glow);
      
      // ข้อความ
      const text = document.createElement('a-text');
      text.setAttribute('value', data.text);
      text.setAttribute('position', "0 1.3 0");
      text.setAttribute('align', "center");
      text.setAttribute('scale', "1.8 1.8 1.8");
      text.setAttribute('color', "#FFFFFF");
      text.setAttribute('font', "mozillavr");
      text.setAttribute('shader', "flat");
      el.appendChild(text);
      
      // อนิเมชันลอย
      const yOffset = parseFloat(data.pos.split(' ')[1]) + 0.4;
      el.setAttribute('animation__hover', `property: position; dir: alternate; dur: ${1800 + Math.random()*1200}; easing: easeInOutSine; loop: true; to: ${data.pos.replace('0.5', yOffset.toFixed(1))}`);
      el.setAttribute('animation__spin', `property: rotation; dir: alternate; dur: 6000; easing: linear; loop: true; to: 0 360 0`);
      
      return el;
    }

    // --------------------------------------------------------------
    // โหลดด่าน
    // --------------------------------------------------------------
    function loadStage(index) {
      if(index >= stagesData.length) {
        titleEl.innerText = "🎉 สำเร็จ! กระบวนการหายใจสมบูรณ์";
        descEl.innerHTML = "🧬 คุณเป็นนักวิทยาศาสตร์ระดับโลก! 🧬";
        container.innerHTML = '';
        grabbableElements = [];
        appState = "COMPLETE";
        updateProgressBar();
        return;
      }

      container.innerHTML = '';
      grabbableElements = [];
      grabbedByHand = [null, null];
      appState = "REACTANTS";

      const data = stagesData[index];
      titleEl.innerText = data.title;
      descEl.innerHTML = data.desc + ' <span id="gesture-hint">👋 ปัดมือซ้าย-ขวาเพื่อเลื่อนด่าน</span>';
      descEl.style.background = "rgba(0, 0, 0, 0.2)";
      descEl.style.color = "#f0f0ff";

      data.reactants.forEach(r => {
        const el = createEntity(r);
        container.appendChild(el);
        grabbableElements.push(el);
      });

      // อัปเดต Progress Bar
      updateProgressBar();
    }

    loadStage(0);

    // --------------------------------------------------------------
    // ฟังก์ชันเลื่อนไปด่านถัดไป (ใช้กับการปัดมือ)
    // --------------------------------------------------------------
    function goToNextStage() {
      if (appState === "TRANSITION" || appState === "COMPLETE") return;
      if (currentStage >= stagesData.length - 1) {
        // ถ้าอยู่ด่านสุดท้าย ให้จบ
        appState = "COMPLETE";
        titleEl.innerText = "🏆 เรียนจบแล้ว!";
        descEl.innerHTML = "🎊 คุณเก่งมาก! ครบทุกกระบวนการแล้ว 🎊";
        return;
      }

      // หยุดการทำงานทั้งหมด
      appState = "TRANSITION";
      grabbedByHand = [null, null];
      
      descEl.innerHTML = "⏳ กำลังเปลี่ยนด่าน... 👋 ปัดเพื่อไปต่อ";
      descEl.style.background = "rgba(0,0,0,0.3)";
      
      // ลบวัตถุเก่าอย่างสวยงาม
      grabbableElements.forEach(el => {
        if (el) {
          el.setAttribute('animation__fadeout', 'property: scale; to: 0 0 0; dur: 600; easing: easeInBack');
        }
      });

      setTimeout(() => {
        currentStage++;
        loadStage(currentStage);
        // เล่นเสียงปัด
        sndSwipe.currentTime = 0; sndSwipe.volume = 0.5; sndSwipe.play();
      }, 700);
    }

    // --------------------------------------------------------------
    // ระบบ MediaPipe Hands
    // --------------------------------------------------------------
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ 
      maxNumHands: 2, 
      modelComplexity: 1, 
      minDetectionConfidence: 0.7, 
      minTrackingConfidence: 0.6 
    });

    hands.onResults((results) => {
      loadingEl.style.display = 'none';

      // อัปเดตนิ้วมือ
      const cursors = [
        {idx: document.getElementById('hand1-index'), thm: document.getElementById('hand1-thumb'), ring: document.getElementById('ring1')},
        {idx: document.getElementById('hand2-index'), thm: document.getElementById('hand2-thumb'), ring: document.getElementById('ring2')}
      ];
      cursors.forEach(c => { 
        c.idx.setAttribute('visible', 'false'); 
        c.thm.setAttribute('visible', 'false');
        c.ring.setAttribute('visible', 'false');
      });

      if (results.multiHandLandmarks) {
        // เก็บข้อมูลมือเพื่อตรวจจับการปัด
        let handPositions = [];

        results.multiHandLandmarks.forEach((landmarks, index) => {
          if(index > 1) return;
          const idxPt = landmarks[8]; 
          const thmPt = landmarks[4];
          const idxX = -(idxPt.x - 0.5) * 14; 
          const idxY = -(idxPt.y - 0.5) * 9;
          const thmX = -(thmPt.x - 0.5) * 14; 
          const thmY = -(thmPt.y - 0.5) * 9;

          // อัปเดตตำแหน่งนิ้ว
          cursors[index].idx.setAttribute('position', `${idxX} ${idxY} -3`);
          cursors[index].thm.setAttribute('position', `${thmX} ${thmY} -3`);
          cursors[index].idx.setAttribute('visible', 'true');
          cursors[index].thm.setAttribute('visible', 'true');
          cursors[index].ring.setAttribute('position', `${(idxX+thmX)/2} ${(idxY+thmY)/2} -3`);
          cursors[index].ring.setAttribute('visible', 'true');

          // เก็บตำแหน่งมือ (ใช้ mid point)
          const midX = (idxX + thmX) / 2;
          const midY = (idxY + thmY) / 2;
          handPositions.push({ id: index, x: midX, y: midY });

          const pinchDist = Math.sqrt(Math.pow(idxX - thmX, 2) + Math.pow(idxY - thmY, 2));
          const isPinching = pinchDist < 0.9;
          
          // ----- ระบบหยิบจับ (เฉพาะ REACTANTS และ PRODUCTS) -----
          if (appState === "REACTANTS" || appState === "PRODUCTS") {
            const handData = { isPinching, pos3D: new THREE.Vector3(midX, midY, -3), id: index };
            
            if (handData.isPinching) {
              if (!grabbedByHand[handData.id]) {
                let closestEl = null; 
                let minD = 1.8;
                grabbableElements.forEach(el => {
                  const d = handData.pos3D.distanceTo(el.object3D.position);
                  const isGrabbedByOther = grabbedByHand.includes(el.id);
                  if (d < minD && !isGrabbedByOther) { 
                    minD = d; 
                    closestEl = el; 
                  }
                });
                if (closestEl) {
                  grabbedByHand[handData.id] = closestEl.id;
                  closestEl.removeAttribute('animation__hover');
                  closestEl.setAttribute('scale', '1.3 1.3 1.3');
                  sndSuck.currentTime = 0; sndSuck.volume = 0.3; sndSuck.play();
                }
              }
              if (grabbedByHand[handData.id]) {
                const el = document.getElementById(grabbedByHand[handData.id]);
                if(el) el.setAttribute('position', `${handData.pos3D.x} ${handData.pos3D.y} -3`);
              }
            } else {
              if (grabbedByHand[handData.id]) {
                const el = document.getElementById(grabbedByHand[handData.id]);
                if(el) el.setAttribute('scale', '1 1 1');
                grabbedByHand[handData.id] = null;
              }
            }
          }
        });

        // ----- ตรวจจับการปัด (Swipe) จากมือข้างที่ว่าง (ไม่จับวัตถุ) -----
        if (appState !== "TRANSITION" && appState !== "COMPLETE") {
          // หามือที่ว่าง (ไม่ได้จับวัตถุ)
          let freeHand = null;
          for (let h of handPositions) {
            // ตรวจสอบว่ามือนี้กำลังจับวัตถุอยู่หรือไม่
            const isGrabbing = grabbedByHand[h.id] !== null;
            if (!isGrabbing) {
              freeHand = h;
              break;
            }
          }

          // ถ้ามีมือว่าง ให้ตรวจจับการปัด
          if (freeHand) {
            const currentX = freeHand.x;
            const handId = freeHand.id;

            if (swipeHandId === null) {
              // เริ่มต้นการปัด
              swipeHandId = handId;
              swipeHandX = currentX;
              isSwiping = false;
            } else if (swipeHandId === handId) {
              // มือเดียวกัน วัดการเคลื่อนที่
              const deltaX = currentX - swipeHandX;
              
              if (Math.abs(deltaX) > swipeThreshold && !isSwiping) {
                // ตรวจจับการปัดสำเร็จ
                isSwiping = true;
                // ตรวจสอบทิศทาง: ถ้าปัดไปทางขวา (ค่า +) ให้ไปด่านถัดไป
                if (deltaX > 0) {
                  goToNextStage();
                }
                // ปัดซ้าย (ค่า -) ไม่ต้องทำอะไร หรือจะย้อนกลับก็ได้ แต่เราทำแค่ไปข้างหน้า
              }
            }
          } else {
            // ไม่มีมือว่าง รีเซ็ตการปัด
            swipeHandId = null;
            swipeHandX = null;
            isSwiping = false;
          }
        } else {
          // ถ้าอยู่ในสถานะเปลี่ยนด่าน หรือจบแล้ว รีเซ็ตการปัด
          swipeHandId = null;
          swipeHandX = null;
          isSwiping = false;
        }

        // ----- ตรวจจับการชนกัน (เฉพาะ REACTANTS) -----
        if (appState === "REACTANTS" && grabbableElements.length === 2) {
          const el1 = grabbableElements[0];
          const el2 = grabbableElements[1];
          if (el1 && el2) {
            const d = el1.object3D.position.distanceTo(el2.object3D.position);
            if (d < 1.3) {
              triggerExplosion(el1.object3D.position, el2.object3D.position);
            }
          }
        }
      }
    });

    // --------------------------------------------------------------
    // เอฟเฟกต์ระเบิด
    // --------------------------------------------------------------
    function triggerExplosion(pos1, pos2) {
      if (appState !== "REACTANTS") return;
      appState = "EXPLODING";
      grabbedByHand = [null, null];
      sndSuck.volume = 0.8; sndSuck.currentTime = 0; sndSuck.play();
      
      const midX = (pos1.x + pos2.x) / 2;
      const midY = (pos1.y + pos2.y) / 2;

      grabbableElements.forEach(el => {
        el.setAttribute('animation__spin', 'property: rotation; to: 0 1080 0; dur: 700');
        el.setAttribute('animation__shrink', 'property: scale; to: 0 0 0; dur: 700');
      });

      setTimeout(() => {
        sndBoom.volume = 0.9; sndBoom.currentTime = 0; sndBoom.play();
        container.innerHTML = ''; 
        
        explosionGroup.setAttribute('position', `${midX} ${midY} -3`);
        explosionGroup.setAttribute('visible', 'true');
        
        document.getElementById('boom-core').setAttribute('animation__scale', 'property: scale; from: 1 1 1; to: 25 25 25; dur: 600; easing: easeOutQuad');
        document.getElementById('boom-core').setAttribute('animation__fade', 'property: material.opacity; from: 1; to: 0; dur: 600; easing: easeOutQuad');
        document.getElementById('boom-shockwave1').setAttribute('animation__scale', 'property: scale; from: 1 1 1; to: 35 35 35; dur: 700; easing: easeOutQuad');
        document.getElementById('boom-shockwave2').setAttribute('animation__scale', 'property: scale; from: 1 1 1; to: 35 35 35; dur: 700; easing: easeOutQuad');
        document.getElementById('boom-shockwave3').setAttribute('animation__scale', 'property: scale; from: 1 1 1; to: 35 35 35; dur: 700; easing: easeOutQuad');
        
        setTimeout(() => {
          explosionGroup.setAttribute('visible', 'false');
          spawnProducts();
        }, 650);
      }, 700);
    }

    // --------------------------------------------------------------
    // แสดงผลิตภัณฑ์
    // --------------------------------------------------------------
    function spawnProducts() {
      sndSuccess.volume = 0.8; sndSuccess.currentTime = 0; sndSuccess.play();
      appState = "PRODUCTS";
      grabbableElements = [];

      const data = stagesData[currentStage];
      descEl.innerHTML = data.successMsg + ' 👋 ปัดมือเพื่อไปด่านถัดไป';
      descEl.style.background = "rgba(46, 204, 113, 0.25)";
      descEl.style.color = "#ccffdd";
      descEl.style.border = "1px solid #2ECC71";

      data.products.forEach(p => {
        const el = createEntity(p);
        el.setAttribute('scale', '0 0 0');
        container.appendChild(el);
        grabbableElements.push(el);
        el.setAttribute('animation__pop', 'property: scale; to: 1 1 1; dur: 900; easing: easeOutElastic');
      });

      // ไม่มี timer รออัตโนมัติอีกต่อไป ใช้การปัดมือเท่านั้น
      // รีเซ็ตการปัดเพื่อให้พร้อมตรวจจับใหม่
      swipeHandId = null;
      swipeHandX = null;
      isSwiping = false;
    }

    // --------------------------------------------------------------
    // เริ่มกล้อง
    // --------------------------------------------------------------
    const videoElement = document.getElementById('webcam');
    const camera = new Camera(videoElement, {
      onFrame: async () => { 
        await hands.send({image: videoElement}); 
      },
      width: 1280, 
      height: 720
    });
    camera.start();

    console.log("🌍 AR Cellular Respiration - ควบคุมด้วยการปัดมือ!");
  </script>
</body>
</html>
